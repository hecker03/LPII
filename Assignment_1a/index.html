<!DOCTYPE html>
<html lang="en">
    <head>
        <title></title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link href="css/style.css" rel="stylesheet">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body>
    <!-- sidebar -->
    <div id="sidebar">
        <h4>Exam Portal</h4>
        <ul>
            <li>Dashboard</li>
            <li>Students</li>
            <li>Exams</li>
            <li>Results</li>
        </ul>
    </div>
    <!-- main content -->
    <div id="main">
        <!-- navbar -->
        <nav class="navbar bg-light px-3 mb-3">
            <span class="navbar-brand">Dashboard</span>
            <span>Welcome, Admin</span>
        </nav>

        <!-- Stats Card -->
        <div class="row">
            <div class="col-md-3">
                <div class="card p-3"><h3>Total Students</h3><p>150</p></div>
            </div>
            <div class="col-md-3">
                <div class="card p-3"><h3>Total Exams</h3><p>50</p></div>
            </div>
            <div class="col-md-3">
                <div class="card p-3"><h3>Results Published</h3><p>8</p></div>
            </div>
            <div class="col-md-3">
                <div class="card p-3"><h3>Pending Results</h3><p>4</p></div>
            </div>
        </div>
        <!-- Table -->
        <table class="table table-striped mt-3">
        <thead>
            <tr>
                <th>Student Name</th>
                <th>Exam</th>
                <th>Score</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>John Doe</td>
                <td>Maths</td>
                <td>85</td>
                <td><span class="badge bg-success">Passed</span></td>
            </tr>
            <tr>
                <td>Jane Smith</td>
                <td>Science</td>
                <td>78</td>
                <td><span class="badge bg-success">Passed</span></td>
            </tr>
            <tr>
                <td>Emily Davis</td>
                <td>History</td>
                <td>65</td>
                <td><span class="badge bg-warning">Pending</span></td>
            </tr>
        </tbody>
        </table>
    </div>
    </body>
</html>
