<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Registered Users</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        background: #f1f5f9;
      }

      .card {
        border-radius: 12px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
      }
    </style>
  </head>

  <body>
    <div class="container mt-5">
      <div class="card p-4">
        <h3 class="mb-3">Registered Users</h3>

        <table class="table table-striped">
          <thead>
            <tr>
              <th>Name</th>
              <th>Email</th>
              <th>Password</th>
            </tr>
          </thead>
          <tbody id="userTable"></tbody>
        </table>

        <a href="index.html" class="btn btn-primary mt-3 custom-btn center-btn"
          >Back</a
        >

        <style>
          .custom-btn {
            width: 100px;
            text-align: center;
            padding-left: 0.5rem;
            padding-right: 0.5rem;
            align-items: center;
          }
          .center-btn {
            display: block;
            margin: 0 auto; /* centers horizontally */
          }
        </style>
      </div>
    </div>

    <script>
      const users = JSON.parse(localStorage.getItem("users")) || [];
      const table = document.getElementById("userTable");

      users.forEach((user) => {
        const row = `
      <tr>
        <td>${user.name}</td>
        <td>${user.email}</td>
        <td>${user.password}</td>
      </tr>
    `;
        table.innerHTML += row;
      });
    </script>
  </body>
</html>
